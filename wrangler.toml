name = "chargily-mcp"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# CHARGILY_API_KEY should be set as a secret via:
# wrangler secret put CHARGILY_API_KEY

[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "ChargilyMCP"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChargilyMCP"]

[[routes]]
pattern = "mcp.ta9in.com/chargily-mcp*"
zone_name = "ta9in.com"
